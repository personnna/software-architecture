services:
  auth-service:
    build: ./services/auth-service
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql://auth_user:auth_pass@auth-db:5432/auth_db
      PORT: 8001
      JWT_SECRET: dev-local-jwt-secret
      ENCRYPTION_KEY: dev-local-encryption-key
      JWT_EXPIRY_HOURS: 12
    depends_on:
      - auth-db
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/healthz')"]
      interval: 30s
      timeout: 5s
      retries: 3

  tournament-service:
    build: ./services/tournament-service
    ports:
      - "8003:8003"
    environment:
      DATABASE_URL: postgresql://tournament_user:tournament_pass@tournament-db:5432/tournament_db
      PORT: 8003
    depends_on:
      - tournament-db
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/healthz')"]
      interval: 30s
      timeout: 5s
      retries: 3

  auth-db:
    image: postgres:16
    environment:
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_pass
      POSTGRES_DB: auth_db
    volumes:
      - auth_db_data:/var/lib/postgresql/data

  tournament-db:
    image: postgres:16
    environment:
      POSTGRES_USER: tournament_user
      POSTGRES_PASSWORD: tournament_pass
      POSTGRES_DB: tournament_db
    volumes:
      - tournament_db_data:/var/lib/postgresql/data

volumes:
  auth_db_data:
  tournament_db_data:
