apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tournament-service-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx
  rules:
    - host: gym-it-system.local
      http:
        paths:
          # Routes external traffic like /api/tournaments/* to the
          # tournament-service, matching how the API Gateway exposes it.
          - path: /api/tournaments(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: tournament-service
                port:
                  number: 8003
