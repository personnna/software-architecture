apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: gym-system
  labels:
    app: api-gateway
    author: shattyk-kuziyeva
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: gym-api-gateway:latest
          ports:
            - containerPort: 8000
          env:
            - name: AUTH_SERVICE_URL
              value: "http://auth-service:8001"
            - name: USER_SERVICE_URL
              value: "http://user-service:8002"
            - name: TOURNAMENT_SERVICE_URL
              value: "http://tournament-service:8003"
            - name: NOTIFICATION_SERVICE_URL
              value: "http://notification-service:8004"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: gym-system
spec:
  selector:
    app: api-gateway
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
  type: LoadBalancer