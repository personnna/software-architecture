<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tournament Setup</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container py-5" style="max-width: 640px;">
    <h2 class="mb-4">Create Tournament</h2>

    <!-- Step 1: tournament details (max 2 clicks to reach bracket generation) -->
    <div class="card mb-4">
      <div class="card-body">
        <div class="mb-3">
          <label class="form-label">Tournament name</label>
          <input id="tName" class="form-control" placeholder="Summer Cup 2026">
        </div>
        <div class="mb-3">
          <label class="form-label">Sport</label>
          <select id="tSport" class="form-select">
            <option value="general">General</option>
            <option value="boxing">Boxing</option>
            <option value="powerlifting">Powerlifting</option>
            <option value="crossfit">CrossFit</option>
          </select>
        </div>
        <button id="createBtn" class="btn btn-primary">Create Tournament</button>
      </div>
    </div>

    <!-- Step 2: participants -->
    <div id="participantsCard" class="card mb-4" style="display:none;">
      <div class="card-body">
        <h5>Participants</h5>
        <div class="input-group mb-2">
          <input id="pName" class="form-control" placeholder="Participant name">
          <button id="addParticipantBtn" class="btn btn-outline-secondary">Add</button>
        </div>
        <ul id="participantList" class="list-group mb-3"></ul>
        <button id="generateBtn" class="btn btn-success">Generate Bracket</button>
      </div>
    </div>

    <!-- Step 3: bracket preview -->
    <div id="bracketCard" class="card" style="display:none;">
      <div class="card-body">
        <h5>Bracket</h5>
        <div id="bracketView"></div>
      </div>
    </div>
  </div>

  <script src="/static/js/tournament.js"></script>
</body>
</html>
