name: Main CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install shared test tooling
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest

      - name: Lint with flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        continue-on-error: true

      - name: Test auth service
        working-directory: services/auth-service
        run: |
          pip install -r requirements.txt
          PYTHONPATH=. pytest tests -q

      - name: Test tournament service
        working-directory: services/tournament-service
        run: |
          pip install -r requirements.txt
          PYTHONPATH=. pytest tests -q

      - name: Test notification service
        working-directory: services/notification-service
        run: |
          pip install -r requirements.txt
          PYTHONPATH=. pytest tests -q

  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API Gateway image
        run: docker build -t gym-api-gateway:latest ./services/api-gateway

      - name: Verify image exists
        run: |
          docker images | grep gym-api-gateway
          echo "Docker build successful!"
