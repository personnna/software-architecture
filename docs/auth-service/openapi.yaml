openapi: 3.0.3
info:
  title: Auth Service API
  description: >
    Owns user registration, login, JWT issuing/verification, role-based access
    control (RBAC), user profiles, and staff management for the GYM IT System.
    Also responsible for the Security quality attribute (JWT auth, RBAC,
    AES-256 encryption of sensitive fields at rest).
  version: 1.0.0
servers:
  - url: http://localhost:8001
    description: Local / direct
  - url: http://localhost:8000/api/auth
    description: Via API Gateway

paths:
  /healthz:
    get:
      summary: Health check
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ok }
                  service: { type: string, example: auth-service }

  /auth/register:
    post:
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email, example: "jo@gym.com" }
                password: { type: string, minLength: 6, example: "secret1" }
                full_name: { type: string, example: "Jo Smith" }
                role:
                  type: string
                  enum: [admin, trainer, member]
                  default: member
                phone: { type: string, example: "+1-555-0100" }
      responses:
        "201":
          description: User created, token issued
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthResponse" }
        "400": { description: Validation error }
        "409": { description: Email already registered }

  /auth/login:
    post:
      summary: Log in
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email, example: "jo@gym.com" }
                password: { type: string, example: "secret1" }
      responses:
        "200":
          description: Authenticated, token issued
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthResponse" }
        "401": { description: Invalid credentials }
        "403": { description: Account disabled }

  /auth/verify:
    get:
      summary: Verify a token and return caller identity
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Token valid
          content:
            application/json:
              schema:
                type: object
                properties:
                  user_id: { type: string }
                  role: { type: string, enum: [admin, trainer, member] }
        "401": { description: Missing/invalid/expired token }

  /me:
    get:
      summary: Get own profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: The current user's profile (phone decrypted)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "401": { description: Unauthenticated }
    patch:
      summary: Update own profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                full_name: { type: string }
                phone: { type: string }
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "401": { description: Unauthenticated }

  /users:
    get:
      summary: List all users (admin only)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/User" }
        "403": { description: Forbidden — not an admin }

  /users/{id}:
    get:
      summary: Get one user (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: User
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "403": { description: Forbidden — not an admin }
        "404": { description: User not found }

  /users/{id}/role:
    patch:
      summary: Change a user's role (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role:
                  type: string
                  enum: [admin, trainer, member]
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "400": { description: Invalid role }
        "403": { description: Forbidden — not an admin }
        "404": { description: User not found }

  /users/{id}/status:
    patch:
      summary: Activate/deactivate an account (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [is_active]
              properties:
                is_active: { type: boolean }
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "400": { description: is_active must be boolean }
        "403": { description: Forbidden — not an admin }
        "404": { description: User not found }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    User:
      type: object
      properties:
        id: { type: string }
        email: { type: string, format: email }
        role: { type: string, enum: [admin, trainer, member] }
        full_name: { type: string, nullable: true }
        phone: { type: string, nullable: true, description: "Only returned on own-profile / admin reads; encrypted at rest." }
        is_active: { type: boolean }
        created_at: { type: string, format: date-time }
    AuthResponse:
      type: object
      properties:
        user: { $ref: "#/components/schemas/User" }
        token: { type: string, description: "JWT (HS256), include as 'Authorization: Bearer <token>'" }
