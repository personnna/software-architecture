apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: auth-service-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    # Enforce HTTPS in transit (TLS termination at the ingress).
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: gym-it-system.local
      http:
        paths:
          # Routes external traffic like /api/auth/* to the auth-service,
          # matching how the API Gateway exposes it.
          - path: /api/auth(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: auth-service
                port:
                  number: 8001
